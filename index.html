<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Consignado</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; color: #333; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        h1 { margin: 0; font-size: 1.5rem; color: #2c3e50; }
        
        /* Botões e Filtros */
        .controles { display: flex; gap: 10px; flex-wrap: wrap; }
        button { padding: 8px 16px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.2s; background-color: #e0e0e0; color: #333; }
        button:hover { background-color: #d0d0d0; }
        button.ativo { background-color: #0056b3; color: white; }
        button#btn-atualizar { background-color: #28a745; color: white; }
        button#btn-atualizar:hover { background-color: #218838; }

        /* Lista de Notícias */
        #lista-noticias-dinamica { max-width: 900px; margin: 0 auto; }
        
        /* Card Base */
        .noticia-item {
            border: 1px solid #ddd;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            background: #fff;
            transition: opacity 0.3s ease; /* Transição suave para mudança de estado */
        }

        /* === ESTILOS DE OPACIDADE (NOVO) === */
        .noticia-vista { opacity: 0.5; }   /* 50% - Já existia no banco, não foi clicada */
        .noticia-clicada { opacity: 0.1; } /* 10% - Já foi acessada pelo usuário */

        .noticia-item h3 { margin: 10px 0 5px; font-size: 1.1rem; line-height: 1.4; }
        .noticia-item a { text-decoration: none; color: #0056b3; }
        .noticia-item a:hover { text-decoration: underline; }
        .noticia-item p { font-size: 0.9em; color: #555; margin: 5px 0; line-height: 1.5; }
        .noticia-meta { font-size: 0.8em; color: #888; display: flex; justify-content: space-between; margin-top: 8px; }
        
        /* Badges de Categoria */
        .badge { padding: 2px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; color: #fff; text-transform: uppercase; }
        .badge-VIAVEL { background-color: #28a745; }
        .badge-DUVIDOSA { background-color: #ffc107; color: #333; }
        .badge-INVIAVEL { background-color: #dc3545; }
        .badge-PENDENTE { background-color: #6c757d; }

        /* Loading Spinner */
        #loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 1000; justify-content: center; align-items: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid #0056b3; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- Overlay de Carregamento -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p id="loading-text">Processando...</p>
    </div>

    <header>
        <h1>📰 Monitor Consignado</h1>
        <div class="controles">
            <button class="filtro-btn ativo" data-categoria="TODAS">Todas</button>
            <button class="filtro-btn" data-categoria="VIAVEL">✅ Viáveis</button>
            <button class="filtro-btn" data-categoria="DUVIDOSA">⚠️ Duvidosas</button>
            <button class="filtro-btn" data-categoria="INVIAVEL">❌ Inviáveis</button>
            <button class="filtro-btn" data-categoria="PENDENTE">🕕 Pendentes</button>
            <button id="btn-atualizar">↻ Atualizar Notícias</button>
        </div>
    </header>

    <main id="lista-noticias-dinamica">
        <p style="text-align:center; color:#666;">Aguardando primeira sincronização...</p>
    </main>

    <!-- Scripts do Projeto -->
    <script src="database.js"></script>
    <script src="rss-reader.js"></script>
    <script src="api-ia.js"></script>

    <script>
        // Estado atual do filtro
        let filtroAtual = 'TODAS';

        // Inicialização
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                await initDatabase();
                console.log("Banco de dados local ativado no HTML.");
                await renderizarListaNoticias(filtroAtual);
            } catch (err) {
                console.error("Erro fatal na inicialização:", err);
            }
        });

        // Event Listeners dos Filtros
        document.querySelectorAll('.filtro-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('ativo'));
                e.target.classList.add('ativo');
                filtroAtual = e.target.dataset.categoria;
                renderizarListaNoticias(filtroAtual);
            });
        });

        // Botão Atualizar
        document.getElementById('btn-atualizar').addEventListener('click', async () => {
            const overlay = document.getElementById('loading-overlay');
            const loadingText = document.getElementById('loading-text');
            
            overlay.style.display = 'flex';
            
            try {
                // 1. Buscar RSS
                loadingText.innerText = "Buscando novas notícias...";
                await atualizarNoticiasDoRSS();
                
                // 2. Classificar com IA
                loadingText.innerText = "Classificando notícias com IA...";
                await classificarNoticiasPendentes();
                
                // 3. Re-renderizar lista
                await renderizarListaNoticias(filtroAtual);
                
            } catch (err) {
                console.error("Erro no fluxo de atualização:", err);
            } finally {
                overlay.style.display = 'none';
            }
        });

        /**
         * Renderiza a lista de notícias aplicando a lógica de opacidade
         */
        async function renderizarListaNoticias(categoriaFiltro) {
            const container = document.getElementById('lista-noticias-dinamica');
            if (!container) return;

            const noticias = await obterTodasNoticias();
            
            // Filtra por categoria
            const noticiasFiltradas = categoriaFiltro === 'TODAS' 
                ? noticias 
                : noticias.filter(n => n.categoria === categoriaFiltro);

            // Ordena: Maior relevância primeiro, depois mais recente
            noticiasFiltradas.sort((a, b) => {
                if (b.relevancia !== a.relevancia) return b.relevancia - a.relevancia;
                return b.dataPublicacao - a.dataPublicacao;
            });

            container.innerHTML = '';

            if (noticiasFiltradas.length === 0) {
                container.innerHTML = '<p style="text-align:center; color:#666; padding:20px;">Nenhuma notícia encontrada nesta categoria.</p>';
                return;
            }

            noticiasFiltradas.forEach(noticia => {
                // === LÓGICA DE OPACIDADE ===
                const jaFoiClicada = foiClicada(noticia.url);
                
                // Se foi clicada -> 10% | Se existe no banco (todas existem aqui) e não foi clicada -> 50%
                // Nota: Se quiser que notícias NOVAS (chegadas nesta sessão) fiquem 100%, 
                // seria necessário um flag temporal. Pela regra "Opção 1", tudo que está no banco é "visto".
                let classeEstado = 'noticia-vista'; 
                if (jaFoiClicada) {
                    classeEstado = 'noticia-clicada';
                }

                const card = document.createElement('div');
                card.className = `noticia-item ${classeEstado}`;
                
                // Formatação de Data
                const dataStr = new Date(noticia.dataPublicacao).toLocaleDateString('pt-BR', {
                    day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute:'2-digit'
                });

                // Escape simples para evitar quebra no onclick se houver aspas simples no título/url
                const urlSafe = noticia.url.replace(/'/g, "\\'");

                card.innerHTML = `
                    <div class="noticia-meta">
                        <span class="badge badge-${noticia.categoria}">${noticia.categoria}</span>
                        <span>Relevância: ${noticia.relevancia || 0}/100</span>
                    </div>
                    <h3>
                        <a href="${noticia.url}" 
                           target="_blank" 
                           rel="noopener noreferrer"
                           onclick="marcarComoClicada('${urlSafe}'); this.closest('.noticia-item').classList.remove('noticia-vista'); this.closest('.noticia-item').classList.add('noticia-clicada');">
                            ${noticia.titulo}
                        </a>
                    </h3>
                    <p>${noticia.snippet || ''}</p>
                    <div class="noticia-meta">
                        <span>📍 ${noticia.fonte || 'Desconhecida'}</span>
                        <span>📅 ${dataStr}</span>
                    </div>
                `;

                container.appendChild(card);
            });
        }
    </script>
</body>
</html>
